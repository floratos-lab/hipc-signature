info:
  description: "API access to HIPC Dashboard"
  version: "1.0.0"
  title: "HIPC Dashboard API"
  termsOfService: ""
  contact:
    email: "feedback@hipc-dashboard.org"
host: "hipc-dashboard.org"
basePath: "/api"

schemes:
  - "https"
produces:
  - "application/json"
paths:
  /studies:
    get:
      summary: "returns a list of studies"
      description: "Returns a list of studies and their signatures"
      operationId: "studies"
      responses:
        200:
          description: "successful operation"
          schema:
            type: array
            items:
              $ref: "#/definitions/Study"
                      
  /signature/{signatureId}:
    get:
      summary: "returns content of a signature"
      description: "Returns a signature description and a list observations in a signature"
      operationId: "signature"
      parameters:
      - name: "signatureId"
        in: path
        required: true
        type: string
        description: "The name of the requested signature"
      - name: "maximum"
        in: query
        required: false
        type: integer
        description: "The maximum number of observations returned by the query (if not specified, all observations are returned)"
      responses:
        404:
          description: "not found"
        200:
          description: "successful operation"
          schema:
            $ref: "#/definitions/Signature"
                          
  /browse/{subjectClass}/{subjectName}:
    get:
      summary: "returns observations for a subject"
      description: "Returns a list observations associated with a subject"
      operationId: "browse"
      parameters:
      - name: "subjectClass"
        in: path
        required: true
        type: string
        enum:
        - "AnimalModel"
        - "CellSample"
        - "Compound"
        - "Gene"
        - "ShRna"
        - "TissueSample"
        - "Evidence"
        description: "The subject class"
      - name: "subjectName"
        in: path
        required: true
        type: string
        description: "The name of the subject"
      - name: "role"
        in: query
        required: false
        type: array
        items:
          type: string
        description: "Restrict returned observations by a comma-separated list of roles"
      - name: "tier"
        in: query
        required: false
        type: array
        items:
          type: integer
          minimum: 1
          maximum: 3
        description: "Restrict returned observations by tier(s)"
      - name: "maximum"
        in: query
        required: false
        type: integer
        description: "The maximum number of observations returned by the query (if not specified, all observations are returned)"
      responses:
        404:
          description: "not found"
        200:
          description: "successful operation"
          schema:
            $ref: "#/definitions/Subject"

  /search/{term}:
    get:
      summary: "search Dashboard"
      parameters:
      - name: "term"
        in: path
        required: true
        type: string
        description: "The search term"
      - name: "role"
        in: query
        required: false
        type: array
        items:
          type: string
        description: "Restrict returned observations by a comma-separated list of roles"
      - name: "tier"
        in: query
        required: false
        type: array
        items:
          type: integer
          minimum: 1
          maximum: 3
        description: "Restrict returned observations by tier(s)"
      - name: "maximum"
        in: query
        required: false
        type: integer
        description: "The maximum number of observations returned by the query (if not specified, all observations are returned)"
      responses:
        404:
          description: "not found"
        200:
          description: "successful operation"
          schema:
            type: array
            items:
              $ref: "#/definitions/Subject"
                    
  /observation/{observationId}:
    get:
      summary: "returns an observation"
      parameters:
      - name: "observationId"
        in: path
        required: true
        type: string
        description: "Id of the requested observation"
      responses:
        404:
          description: "not found"
        200:
          description: "successful operation"
          schema:
            $ref: "#/definitions/Observation"
      
  /observations/{signatureId}/{indexRanges}:
    get:
      summary: "returns observations from a signature"
      parameters:
      - name: "signatureId"
        in: path
        required: true
        type: string
        description: "The name of the requested signature"
      - name: "indexRanges"
        in: path
        required: true
        type: string
        description: >-
          Comma-separated list of indexRanges; each indexRange is either a single index or 
          startIndex-endIndex, e.g. 1,3-5,7,9-13
      responses:
        404:
          description: "not found"
        200:
          description: "successful operation"
          schema:
            type: array
            items:
              $ref: "#/definitions/Observation"
      
definitions:
  
  Study:
    type: object
    properties:
      description:
        type: string
      pmid:
        type: string
      publication_date:
        type: string
        format: date
      signatures:
        type: array
        items:
          $ref: "#/definitions/DashboardURI"
  
  Signature:
    type: object
    properties:
      signature_name:
        type: string
      signature_date:
        type: string
        format: date
      tier:
        type: integer
        minimum: 1
        maximum: 3
      project:
        type: string
      signature_description:
        type: string
      story_title:
        type: string
      observation_count: 
        type: integer
        description: "The total number of observations in a signature"
      observations:
        type: array
        items: 
          $ref: "#/definitions/DashboardURI"

  Subject:
    type: object
    properties:
      class:
        type: string
      name:
        type: string
      synonyms:
        type: array
        items:
          type: string
      xref:
        type: array
        items:
          type: object
          properties:
            source:
              type: string
            id:
              type: string
      roles:
        type: array
        items:
          type: string
      observation_count: 
        type: object
        properties:
          tier1:
            type: integer
          tier2:
            type: integer
          tier3:
            type: integer
      observations:
        type: array
        items: 
          $ref: "#/definitions/DashboardURI"
    required:
    - "class"
    - "name"
    - "observation_count"
  
  Observation:
    type: object
    properties:
      signature_id:
        type: string
      observation_summary:
        type: string
      subject_list:
        type: array
        items:
          type: object
          properties:
            class:
              type: string
            role:
              type: string
            description:
              type: string
            name:
              type: string
            subject_uri:
              $ref: "#/definitions/DashboardURI"
      evidence_list:
        type: array
        items:
          type: object
          properties:
            class:
              type: string
              enum:
                - "label"
                - "numeric"
                - "url"
                - "file"
            type:
              type: string
            description:
              type: string
            value:
              type: string
            units:
              type: string
            mime_type:
              type: string
          required:
            - "class"
            - "type"
            - "description"
            - "value"

  DashboardURI:
    type: string
    description: URI for a Dashboard API object (observation, subject, signature)